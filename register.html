<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - WellnessHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen">
    <h1 class="form-title">Create Account</h1>
    <p class="form-subtitle">Join WellnessHub</p>

    <form id="registerForm" onsubmit="return validateRegisterForm(event)" novalidate>
      <div class="field">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter full name">
        <div class="field-error" id="fullName-error"></div>
      </div>

      <div class="field">
        <label for="email">University Email</label>
        <input type="email" id="email" name="email" placeholder="name@richfield.ac.za">
        <div class="field-error" id="email-error"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••">
        <div class="field-error" id="password-error"></div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••">
        <div class="field-error" id="confirmPassword-error"></div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="popiaAgree" name="popiaAgree">
        <label for="popiaAgree">I agree to the <a href="#">POPIA Privacy Policy</a>?</label>
      </div>
      <div class="field-error" id="popiaAgree-error"></div>

      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <p class="footer-note">Already have an account? <a href="login.html">Login</a></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
