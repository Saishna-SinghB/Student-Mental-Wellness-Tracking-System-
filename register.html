<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account WellnessHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="screen">
    <div class="card">

      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🌿</span>
        <span class="brand-name">WellnessHub</span>
      </div>

      <h2>Create your account</h2>
      <p class="hint" style="margin-top:-8px; margin-bottom:18px;">Your check-ins and journal stay private to you.</p>

      <div id="register-banner" class="status-banner" role="status" aria-live="polite"></div>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" name="name" autocomplete="name" />
          <p class="error-text" id="reg-name-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="reg-student-number">Student number</label>
          <input type="text" id="reg-student-number" name="studentNumber" inputmode="numeric" />
          <p class="error-text" id="reg-student-number-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="reg-email">Email address</label>
          <input type="email" id="reg-email" name="email" autocomplete="email" />
          <p class="error-text" id="reg-email-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" autocomplete="new-password" />
          <p class="error-text" id="reg-password-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="reg-confirm">Confirm password</label>
          <input type="password" id="reg-confirm" name="confirmPassword" autocomplete="new-password" />
          <p class="error-text" id="reg-confirm-error" aria-live="polite"></p>
        </div>

        <button type="submit" class="btn btn-primary">Create account</button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
