<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WellnessHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen">
    <h1 class="form-title">Welcome Back</h1>
    <p class="form-subtitle">Login to your account</p>

    <form id="loginForm" onsubmit="return validateLoginForm(event)" novalidate>
      <div class="field">
        <label for="loginEmail">University Email</label>
        <input type="email" id="loginEmail" name="loginEmail" placeholder="name@richfield.ac.za">
        <div class="field-error" id="loginEmail-error"></div>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="loginPassword" placeholder="••••••••">
        <div class="field-error" id="loginPassword-error"></div>
      </div>

      <p class="forgot-link"><a href="#">Forgot Password?</a></p>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="divider">or login with</p>
    <button type="button" class="btn btn-outline" onclick="biometricLogin()">◎ Biometric Login</button>

    <p class="legal-note">By continuing, you agree to our <a href="#">Privacy Policy</a> and <a href="#">POPIA Compliance</a>.</p>

    <p class="footer-note">Don't have an account? <a href="register.html">Create Account</a></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
