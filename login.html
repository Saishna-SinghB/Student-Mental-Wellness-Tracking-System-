<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — WellnessHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="screen">
    <div class="card">

      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🌿</span>
        <span class="brand-name">WellnessHub</span>
      </div>

      <h2>Welcome back</h2>
      <p class="hint" style="margin-top:-8px; margin-bottom:18px;">Log in to continue your wellness check ins.</p>

      <div id="login-banner" class="status-banner" role="status" aria-live="polite"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email address</label>
          <input type="email" id="login-email" name="email" autocomplete="email" />
          <p class="error-text" id="login-email-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" />
          <p class="error-text" id="login-password-error" aria-live="polite"></p>
        </div>

        <button type="submit" class="btn btn-primary">Log in</button>
      </form>

      <p class="form-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
